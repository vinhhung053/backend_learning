version: '3'

services:
  mysql-local:
    image: mysql:8.0
    container_name: mysql-local
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=shortener
#      - MYSQL_USER=root
#      - MYSQL_PASSWORD=root
    ports:
      - 3306:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  myapp-main:
    build:
      context: .
      dockerfile: Dockerfile
    image: amarin/url-shortener
    restart: on-failure
    depends_on:
      mysql-local:
        condition: service_healthy
    ports:
      - 8080:8080